services:
  - type: web
    name: nexus-agent
    runtime: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: python ui/server.py --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        sync: false          # you fill this in on Render dashboard
      - key: BASE_URL
        sync: false          # e.g. https://openrouter.ai/api/v1
      - key: UI_SECRET
        generateValue: true  # Render auto-generates a random secret for you
    healthCheckPath: /
